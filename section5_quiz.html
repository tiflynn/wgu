{type:'mc',

{type:'mc',
 q:'Income from Continuing Operations is calculated starting from Operating Income by:',

{type:'mc',

       'The value of goods sold during the period',
       'Total assets minus total liabilities'],
 correct:0,

       'OCI and comprehensive income',
       'Interest expense and income tax expense'],
 correct:0,

{type:'mc',
 q:'Comprehensive Income reflects:',

       'The company\'s total revenue for the period',
       'The value of a company\'s total assets'],
 correct:0,

 mnemonic:'💡 Memory tip: Comprehensive Income is Net Income plus the "everything else" that changed the company\'s wealth.'},

       'Cash received from customers',
       'Income tax expense adjustments'],
 correct:0,

{type:'mc',
 q:'"Financial Capital Maintenance," as a conceptual measure of income, refers to:',

       'An increase in physical resources or productive capacity',
       'The cash a company has on hand at year-end',
       'The total revenue earned during the period'],
 correct:0,
 explanation:'Financial capital maintenance is about tracking dollars of wealth (equity), separate from money owners put in or took out.',
 mnemonic:'💡 Memory tip: Financial capital maintenance counts dollars of wealth, not machines on the factory floor.'},

{type:'mc',
 q:'"Physical Capital Maintenance," as a conceptual measure of income, refers to:',

       'An increase in the dollar value of equity',
       'A company\'s net income for the year',
       'The market value of a company\'s stock'],
 correct:0,
 explanation:'Physical capital maintenance tracks growth in productive capacity itself — factories, equipment, resources — not dollar-denominated wealth.',

       'Money earned from lending funds to others',
       'Rent collected from tenants'],
 correct:0,
 explanation:'Sales Revenue is the most common type of revenue and reflects the aggregate selling price of goods sold during the period.',
 mnemonic:'💡 Memory tip: Sold a product? That\'s Sales Revenue, plain and simple.'},

{type:'mc',

       'Service revenue only applies to government entities'],
 correct:0,

{type:'ms',

       'Rent Revenue',
       'Cost of Goods Sold'],

 explanation:'Other Revenue includes Licensing Revenue, Franchise Revenue, Rent Revenue, and Premium Revenue. Cost of Goods Sold is an expense, not a revenue.',
 mnemonic:'💡 Memory tip: Picture a company licensing its logo, franchising its brand, and renting out a spare building — three extra revenue streams beyond sales and services.'},

{type:'mc',

       'The cost of running the corporate head office',
       'The estimated wear and tear on long-term assets'],
 correct:0,
 explanation:'When a business sells goods, the cost of those goods is recorded as an expense called Cost of Goods Sold, or Cost of Sales.',
 mnemonic:'💡 Memory tip: COGS is the price tag the seller paid, not the price tag the customer paid.'},

{type:'mc',
 q:'In the U.S., Research and Development costs are classified as:',

       'The tax refund expected in the following year'],
 correct:0,
