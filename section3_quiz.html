<script>
const questions = [
{type:'mc',
 q:'What are the three major categories contained in a balance sheet?',
 opts:['Assets, liabilities, and owners\' equity',
       'Revenue, expenses, and net income',
       'Cash, inventory, and equipment',
       'Income statement, balance sheet, and cash flow statement'],
 correct:0,
 explanation:'The balance sheet has exactly three major categories: assets (resources the firm has), liabilities (obligations the firm owes), and owners\' equity (the owners\' residual claim on what\'s left).',
 mnemonic:'💡 Memory tip: Think \'A-L-E\' — Assets, Liabilities, Equity — the three legs of the balance sheet stool.'},

{type:'mc',
 q:'What do liabilities represent on the balance sheet?',
 opts:['The firm\'s obligations to others',
       'The resources owned by the firm',
       'The owners\' residual claim on the business',
       'The firm\'s total revenue for the year'],
 correct:0,
 explanation:'Liabilities represent the firm\'s obligations — what it owes to creditors, suppliers, lenders, and others.',
 mnemonic:'💡 Memory tip: Liability sounds like \'liable\' — you\'re liable (responsible) for paying it back.'},

{type:'mc',
 q:'On a corporation\'s balance sheet, owners\' equity is more specifically called:',
 opts:['Stockholders\' equity (or shareholders\' equity)',
       'Net income',
       'Retained capital',
       'Working capital'],
 correct:0,
 explanation:'Because a corporation\'s owners hold stock/shares, the \'owners\' equity\' section is labeled stockholders\' equity or shareholders\' equity instead.',
 mnemonic:'💡 Memory tip: Stockholders = stock + holders. If they hold stock, they\'re stockholders, not just generic \'owners.\''},

{type:'mc',
 q:'Owners\' equity is described as the owners\' \'residual interest\' in the assets. What does \'residual\' mean in this context?',
 opts:['What\'s left over after liabilities are paid off',
       'The total value of all the firm\'s assets',
       'The amount owners originally invested in the firm',
       'The interest rate the firm pays to its lenders'],
 correct:0,
 explanation:'Residual means \'left over.\' If you sold all the assets and paid off every liability, whatever cash remained would belong to the owners — that leftover claim is their residual interest.',
 mnemonic:'💡 Memory tip: Picture splitting a pizza: creditors eat first and take their guaranteed slices. Owners only get whatever\'s left in the box.'},

{type:'mc',
 q:'Which formula correctly expresses owners\' equity as a residual claim?',
 opts:['Owners\' Equity = Assets − Liabilities',
       'Owners\' Equity = Assets + Liabilities',
       'Owners\' Equity = Liabilities − Assets',
       'Owners\' Equity = Assets ÷ Liabilities'],
 correct:0,
 explanation:'Owners\' Equity = Assets − Liabilities. This rearranges the fundamental accounting equation (Assets = Liabilities + Owners\' Equity) to isolate equity as whatever remains after subtracting what\'s owed.',
 mnemonic:'💡 Memory tip: Remember the seesaw: Assets = Liabilities + Equity. Slide Liabilities to the other side and you get Equity = Assets − Liabilities.'},

{type:'mc',
 q:'Why are owners considered to have only a \'secondary\' claim on a business\'s assets compared to creditors?',
 opts:['Creditors have fixed, contractual claims that must be paid regardless of performance, while owners only get what\'s left',
       'Owners never have any legal right to company assets',
       'Creditors own more shares of the company than the owners',
       'Owners are legally required to pay creditors out of their personal funds'],
 correct:0,
 explanation:'Liabilities are fixed obligations that must be satisfied no matter how the business performs. Owners absorb the ups and downs of the business and only receive what remains after those fixed claims are settled — that\'s why their claim is residual/secondary.',
 mnemonic:'💡 Memory tip: Fixed claims get paid first because they\'re \'fixed\' — equity is what\'s left over, so it\'s flexible and absorbs the risk.'},

{type:'mc',
 q:'A company has $40,000 in total assets and $20,000 in total liabilities. What is its owners\' equity?',
 opts:['$20,000',
       '$60,000',
       '$40,000',
       '$0'],
 correct:0,
 explanation:'Owners\' Equity = Assets − Liabilities = $40,000 − $20,000 = $20,000.',
 mnemonic:'💡 Memory tip: Same logic every time: take the big pile (assets), subtract what\'s owed (liabilities), and whatever remains is equity.'},

{type:'mc',
 q:'A business has $15,000 in assets and $20,000 in liabilities. What does this tell you about its owners\' equity?',
 opts:['Owners\' equity is negative ($5,000), meaning owners have absorbed losses beyond their investment',
       'Owners\' equity is impossible to calculate without more information',
       'Owners\' equity must be exactly $0 since liabilities exceed assets',
       'Owners\' equity is $35,000, since you add liabilities and assets together'],
 correct:0,
 explanation:'Owners\' Equity = $15,000 − $20,000 = −$5,000. Since liabilities are fixed obligations that don\'t shrink just because assets lost value, the owners absorb the shortfall, pushing equity negative.',
 mnemonic:'💡 Memory tip: Negative equity is the \'owners eat the loss first\' scenario — liabilities never move just because the assets did.'},

{type:'mc',
 q:'What is the formal definition of an asset?',
 opts:['Probable future economic benefits obtained or controlled by a particular entity as a result of past transactions or events',
       'Any item a company has purchased with cash',
       'Money owed to a company by its customers',
       'Resources that a company plans to acquire in the future'],
 correct:0,
 explanation:'This is the formal accounting definition: assets are probable future economic benefits, obtained or controlled by the entity, resulting from past transactions or events.',
 mnemonic:'💡 Memory tip: Break it into 3 parts to memorize it: PROBABLE + FUTURE BENEFIT + PAST TRANSACTION. \'P-F-P\' — Probably, you\'ll benefit From the Past.'},

{type:'ms',
 q:'The formal definition of an asset includes which key phrases? (Select all that apply)',
 opts:['Probable',
       'Future economic benefits',
       'Obtained or controlled',
       'Guaranteed and legally owned'],
 correctSet:[0,1,2],
 explanation:'The three key phrases in the asset definition are \'probable,\' \'future economic benefits,\' and \'obtained or controlled.\' Notice the definition specifically does NOT require certainty (\'guaranteed\') or legal ownership.',
 mnemonic:'💡 Memory tip: The definition is built to avoid the words \'certain\' and \'owned\' on purpose — that\'s the whole point of \'probable\' and \'controlled.\''},

{type:'mc',
 q:'What does the accounting phrase \'substance over form\' mean?',
 opts:['Financial statements should reflect economic reality, not just superficial legal technicalities',
       'Financial statements should always follow strict legal documentation over common sense',
       'A company\'s physical assets are more important than its intangible assets',
       'Only audited financial statements can be trusted'],
 correct:0,
 explanation:'Substance over form means financial statements should report the real economic reality (who actually controls and benefits from something) rather than just what the legal paperwork says.',
 mnemonic:'💡 Memory tip: Form is the paperwork costume; substance is what\'s really underneath it. Accounting looks under the costume.'},

{type:'mc',
 q:'A firm buys a car using a bank loan, and the bank legally retains title to the car until the loan is paid off. How is this car reported?',
 opts:['As an asset of the firm, because the firm controls its use',
       'As an asset of the bank, because the bank holds legal title',
       'It cannot be reported as an asset by anyone until the loan is fully paid',
       'As an asset split equally between the firm and the bank'],
 correct:0,
 explanation:'Even though the bank holds legal title (the \'form\'), the firm controls and uses the car and gets the economic benefit from it (the \'substance\'). So the car is reported as the firm\'s asset.',
 mnemonic:'💡 Memory tip: Whoever\'s driving the car to work every day is the one who \'has\' it economically — title on paper doesn\'t change who\'s behind the wheel.'},

{type:'mc',
 q:'Under what condition would a leased building be reported as an asset on the lessee\'s (renter\'s) balance sheet?',
 opts:['If the lease is long-term and non-cancelable, giving the company control of the building for most of its economic life',
       'If the company pays cash for the lease instead of financing it',
       'Any lease automatically qualifies the building as an asset, regardless of length',
       'Only if the company eventually plans to purchase the building outright'],
 correct:0,
 explanation:'A leased building counts as an asset only if the lease gives the company control over the building for substantially all of its useful economic life — short, easily cancelable leases do not qualify.',
 mnemonic:'💡 Memory tip: Ask: \'does this lease basically act like ownership?\' If yes (long-term, locked-in, most of the asset\'s life), it\'s an asset.'},

{type:'ms',
 q:'Which of the following are examples of TANGIBLE assets (assets with physical substance)? (Select all that apply)',
 opts:['Cash',
       'Inventory',
       'Property, plant, and equipment',
       'Patents'],
 correctSet:[0,1,2],
 explanation:'Tangible assets have physical substance: cash, inventory, and property/plant/equipment all qualify. Patents are intangible — they\'re a legal right, not a physical object.',
 mnemonic:'💡 Memory tip: Tangible = you can touch it. Cash, inventory, and equipment all exist physically; a patent is just a legal right on paper.'},

{type:'ms',
 q:'Which of the following are examples of INTANGIBLE assets (no physical substance, but legal claims or rights)? (Select all that apply)',
 opts:['Receivables',
       'Patents',
       'Equipment',
       'Goodwill'],
 correctSet:[0,1,3],
 explanation:'Receivables (a claim to future cash), patents (an exclusive legal right), and goodwill are all intangible assets. Equipment is tangible since it has physical substance.',
 mnemonic:'💡 Memory tip: Intangible = \'in-TANGIBLE\' = NOT able to be touched. Receivables, patents, and goodwill are rights and claims, not physical objects.'},

{type:'dd',
 q:'Drag each asset into the correct category: Tangible or Intangible.',
 cols:['Tangible Asset',
       'Intangible Asset'],
 items:[
   {text:'Cash', answer:'Tangible Asset'},
   {text:'Inventory', answer:'Tangible Asset'},
   {text:'Equipment', answer:'Tangible Asset'},
   {text:'Accounts Receivable', answer:'Intangible Asset'},
   {text:'Patent', answer:'Intangible Asset'},
   {text:'Goodwill', answer:'Intangible Asset'},
 ],
 explanation:'Tangible assets have physical substance (cash, inventory, equipment). Intangible assets represent legal claims or rights with no physical form (receivables, patents, goodwill).',
 mnemonic:'💡 Memory tip: If you can physically hold it in your hands, it\'s tangible. If it\'s just a right or a claim on paper, it\'s intangible.'},

{type:'mc',
 q:'In what order are assets generally listed on the balance sheet?',
 opts:['In order of liquidity — how easily the item can be turned into cash',
       'In alphabetical order',
       'In order of original purchase price, highest to lowest',
       'In order of the date the asset was acquired, oldest first'],
 correct:0,
 explanation:'Assets are listed in order of liquidity, meaning how quickly and easily they can be converted into cash. Cash itself is listed first since it\'s already maximally liquid.',
 mnemonic:'💡 Memory tip: Liquidity = how \'liquid\' (cash-like) something is. The most cash-like assets float to the top of the list.'},

{type:'ms',
 q:'According to the typical liquidity ordering on a balance sheet, which of these assets are normally listed BEFORE property, plant, and equipment? (Select all that apply)',
 opts:['Cash',
       'Accounts receivable',
       'Inventory',
       'Goodwill'],
 correctSet:[0,1,2],
 explanation:'Cash, accounts receivable, and inventory are all more liquid than property, plant, and equipment, so they appear earlier on the balance sheet. Goodwill (an intangible) is listed near the very bottom, after PP&E.',
 mnemonic:'💡 Memory tip: Picture the liquidity ladder top to bottom: Cash → Short-term investments → Receivables → Inventory → Prepaid expenses → PP&E → Intangibles (goodwill last).'},

{type:'mc',
 q:'On Safeway\'s 2012 balance sheet, which asset is listed first, and why?',
 opts:['Cash ($352.2 million), because it is the most liquid asset',
       'Goodwill, because it is the company\'s most valuable asset',
       'Property, because it is the largest dollar amount',
       'Accounts receivable, because customers owe the most money'],
 correct:0,
 explanation:'Safeway lists cash ($352.2 million) first because assets are ordered by liquidity, and cash is already in its most liquid (spendable) form.',
 mnemonic:'💡 Memory tip: First on the list = most liquid. Cash doesn\'t need to be \'converted\' into cash — it already is cash, so it always leads.'},

{type:'mc',
 q:'What is the formal definition of a liability?',
 opts:['Probable future sacrifices of economic benefits arising from present obligations to transfer assets or provide services in the future, as a result of past transactions or events',
       'Any debt that a company plans to incur next year',
       'The total amount of cash a company currently has in the bank',
       'Resources owned and controlled by the company'],
 correct:0,
 explanation:'This is the formal definition of a liability — notice it mirrors the asset definition, but instead of future benefits coming IN, it\'s future sacrifices going OUT.',
 mnemonic:'💡 Memory tip: Assets = benefits coming TO you. Liabilities = sacrifices going FROM you. Same structure, opposite direction.'},

{type:'mc',
 q:'The word \'obligation\' in the liability definition includes which of the following?',
 opts:['Legal commitments as well as moral, social, and implied obligations',
       'Only legally binding contracts signed by both parties',
       'Only obligations that have already been paid in cash',
       'Only obligations owed to banks specifically'],
 correct:0,
 explanation:'Obligation is broader than just legal contracts — it also includes moral, social, and implied obligations, applying \'substance over form\' once again.',
 mnemonic:'💡 Memory tip: Obligation isn\'t just \'what\'s in the contract\' — it\'s \'what you\'re really on the hook for,\' contract or not.'},

{type:'mc',
 q:'A university receives a student\'s tuition payment at the start of the semester. According to the liability definition, what does the university now have?',
 opts:['A liability to provide a service (education) to the student over the semester',
       'An asset only, with no offsetting obligation',
       'Nothing, since liabilities only involve transferring cash, never services',
       'A liability to refund the tuition in full at the end of the semester'],
 correct:0,
 explanation:'Liabilities include obligations to provide services, not just transfer assets. Having received the tuition, the university now owes the student a service: the education itself.',
 mnemonic:'💡 Memory tip: You paid tuition expecting an education, not a refund — so the school\'s \'debt\' to you is a service, not cash.'},

{type:'mc',
 q:'A company expects to pay $80,000 next year for electricity it will use throughout next year. As of December 31 of THIS year, before any of that electricity has been used, does the company report an $80,000 liability?',
 opts:['No, because the liability only arises once the electricity is actually used — it hasn\'t happened yet',
       'Yes, because the company is certain it will use the electricity eventually',
       'Yes, but only half the amount ($40,000) should be reported',
       'No, electricity costs are never reported as liabilities under any circumstance'],
 correct:0,
 explanation:'Liabilities must arise from a past transaction or event. Since the electricity hasn\'t been used yet as of December 31, there\'s no liability yet — only future use of electricity (a future event) would create one.',
 mnemonic:'💡 Memory tip: No liability without a triggering event that\'s already happened. Expecting to use electricity next year isn\'t the same as having used it.'},

{type:'mc',
 q:'If a company has already used electricity this month but hasn\'t yet paid the bill, how should this be treated?',
 opts:['As a liability, because the triggering event (using the electricity) has already occurred',
       'Not as a liability, because no cash has changed hands yet',
       'As an asset, because the company benefited from the electricity',
       'It should not be recorded until the following fiscal year'],
 correct:0,
 explanation:'Once the electricity has actually been used, the past transaction requirement is satisfied, and a liability (e.g., \'utilities payable\') should be recorded even though payment hasn\'t been made yet.',
 mnemonic:'💡 Memory tip: The bill might come later, but the obligation was created the moment you flipped the light switch, not when the invoice arrives.'},

{type:'ms',
 q:'Which of the following are examples of liabilities mentioned in the text? (Select all that apply)',
 opts:['Accounts payable',
       'Wages payable',
       'Interest payable',
       'Retained earnings'],
 correctSet:[0,1,2],
 explanation:'Accounts payable, wages payable, and interest payable are all liabilities — obligations to pay for goods, labor, or borrowed money already received/incurred. Retained earnings is part of owners\' equity, not a liability.',
 mnemonic:'💡 Memory tip: Anything ending in \'...payable\' is almost always a liability — it\'s literally telling you something is owed.'},

{type:'mc',
 q:'What is a key difference between accounts payable and a bank loan?',
 opts:['Loans usually require the payment of interest, while accounts payable typically does not',
       'Accounts payable is always larger in dollar amount than a bank loan',
       'Bank loans can never be classified as long-term liabilities',
       'Accounts payable is a form of owners\' equity, not a liability'],
 correct:0,
 explanation:'Accounts payable arises from buying goods on credit and typically doesn\'t carry interest. Bank loans, by contrast, usually require interest payments to the lender.',
 mnemonic:'💡 Memory tip: Suppliers usually just want their money back (no interest) — banks are in the business of charging interest, that\'s their whole model.'},

{type:'mc',
 q:'How are liabilities generally grouped/ordered on the balance sheet?',
 opts:['According to their due dates, with short-term liabilities listed first',
       'According to liquidity, exactly the same way as assets',
       'Alphabetically by creditor name',
       'By dollar amount, largest to smallest'],
 correct:0,
 explanation:'Liabilities are grouped by due date, with short-term liabilities (due soonest) listed first, followed by long-term liabilities.',
 mnemonic:'💡 Memory tip: Assets are ordered by \'how fast it becomes cash\'; liabilities are ordered by \'how fast you have to pay it.\' Both put the soonest/fastest item first.'},

{type:'mc',
 q:'If a business is dissolved, who legally must be paid first?',
 opts:['Creditors, with anything left over going to the owners',
       'Owners, with anything left over going to creditors',
       'Both owners and creditors are paid simultaneously and equally',
       'Neither — all assets are liquidated and given to the government'],
 correct:0,
 explanation:'Creditors have a primary (legal, first) claim on a dissolved business\'s assets. Owners only receive what\'s left over afterward — their residual, secondary claim.',
 mnemonic:'💡 Memory tip: This is the residual interest idea again: creditors eat first, owners get dessert (if there\'s any left).'},

{type:'mc',
 q:'What is another common name for owners\' equity, since it also equals Assets minus Liabilities?',
 opts:['Net assets',
       'Gross assets',
       'Net liabilities',
       'Working capital'],
 correct:0,
 explanation:'Owners\' equity is often called \'net assets\' because it equals Assets − Liabilities — the \'net\' amount of assets after backing out what\'s owed.',
 mnemonic:'💡 Memory tip: \'Net\' always means \'after subtracting something.\' Net assets = assets after subtracting (netting out) liabilities.'},

{type:'mc',
 q:'Safeway\'s 2012 balance sheet reports total assets of $14.657 billion and total liabilities of $11.724 billion. What is Safeway\'s owners\' equity (net assets)?',
 opts:['Approximately $2.933 billion',
       'Approximately $26.381 billion',
       'Approximately $11.724 billion',
       'Approximately $14.657 billion'],
 correct:0,
 explanation:'Owners\' Equity = Assets − Liabilities = $14.657 billion − $11.724 billion ≈ $2.933 billion (difference due to rounding).',
 mnemonic:'💡 Memory tip: Same formula as always, just bigger numbers: take the big assets pile, subtract the liabilities pile, and what\'s left is equity.'},

{type:'ms',
 q:'Which of the following actions/events INCREASE owners\' equity? (Select all that apply)',
 opts:['Owners invest assets into the company',
       'The company generates a profit',
       'Owners withdraw assets from the company',
       'The company suffers a loss'],
 correctSet:[0,1],
 explanation:'Owners\' equity increases when owners invest additional assets into the business and when the company generates a profit. It decreases when owners withdraw assets or when the company suffers a loss.',
 mnemonic:'💡 Memory tip: Think of equity like a bathtub: owner investments and profits are water flowing IN; withdrawals and losses are water draining OUT.'},

{type:'ms',
 q:'Which of the following actions/events DECREASE owners\' equity? (Select all that apply)',
 opts:['Owners withdraw assets from the company',
       'The company suffers a loss',
       'Owners invest assets into the company',
       'The company generates a profit'],
 correctSet:[0,1],
 explanation:'Owners\' equity decreases when owners withdraw assets and when the company suffers a loss. It increases with owner investments and company profits.',
 mnemonic:'💡 Memory tip: Withdrawals and losses both take value OUT of the business — and anything taken out shrinks the owners\' residual claim.'},

{type:'dd',
 q:'Drag each event into the correct category: whether it Increases or Decreases owners\' equity.',
 cols:['Increases Equity',
       'Decreases Equity'],
 items:[
   {text:'Owners invest assets', answer:'Increases Equity'},
   {text:'Company generates a profit', answer:'Increases Equity'},
   {text:'Owners withdraw assets', answer:'Decreases Equity'},
   {text:'Company suffers a loss', answer:'Decreases Equity'},
 ],
 explanation:'Per Table 2.2: owner investments and company profits increase equity; owner withdrawals and company losses decrease equity.',
 mnemonic:'💡 Memory tip: Two ways in, two ways out — owners adding/removing money, and the business winning/losing money.'},

{type:'mc',
 q:'What does \'paid-in capital\' represent?',
 opts:['Money that owners/shareholders directly invested in the company in exchange for stock',
       'Accumulated profits the company has kept over its history',
       'Money the company owes to its suppliers',
       'The total market value of the company\'s outstanding shares today'],
 correct:0,
 explanation:'Paid-in capital is the amount shareholders directly invested into the company in exchange for shares of stock — it tracks the \'owners invest assets\' side of Table 2.2.',
 mnemonic:'💡 Memory tip: Paid-IN capital is money owners physically paid IN to the company to get their shares.'},

{type:'mc',
 q:'What is an Initial Public Offering (IPO)?',
 opts:['The first time a company sells shares of stock to the public',
       'Any time a company issues a press release about its earnings',
       'The process of a company buying back its own shares',
       'A company\'s very first quarterly financial report'],
 correct:0,
 explanation:'An IPO is the very first time a company sells shares to the public, marking its transition into a publicly traded company.',
 mnemonic:'💡 Memory tip: IPO = \'Initial\' — the word literally means \'first.\' It\'s the company\'s debut stock sale.'},

{type:'mc',
 q:'If a company has already gone public and later issues additional new shares, what is this subsequent stock issuance called?',
 opts:['A seasoned equity offering',
       'A second IPO',
       'A reverse stock split',
       'A retained earnings distribution'],
 correct:0,
 explanation:'Any stock issuance after the initial IPO is called a seasoned equity offering — the company is already \'seasoned\' (experienced) in the public markets.',
 mnemonic:'💡 Memory tip: \'Seasoned\' = experienced, not new. A seasoned equity offering comes from a company that\'s already been through the IPO process once.'},

{type:'mc',
 q:'What is the primary benefit of companies providing financial statements to outside parties?',
 opts:['They increase the information available, making it easier for companies to attract investors and lenders on more favorable terms',
       'They allow companies to avoid paying taxes by showing lower profits',
       'They give managers a way to hide unfavorable results from the public',
       'They replace the need for an external audit entirely'],
 correct:0,
 explanation:'By providing financial data about themselves, companies reduce uncertainty about their financial prospects, allowing them to borrow at lower interest rates and attract investors on more favorable terms.',
 mnemonic:'💡 Memory tip: More info = less uncertainty = better deals. Think of it as a company\'s way of building trust with the outside world.'},

{type:'ms',
 q:'What can a potential lender or investor use a company\'s financial statements for? (Select all that apply)',
 opts:['Making more informed projections of how the company will perform in the future',
       'Reducing uncertainty about the company\'s financial prospects',
       'Guaranteeing the company will never suffer a loss',
       'Assessing the company\'s financial position at a specific point in time'],
 correctSet:[0,1,3],
 explanation:'Financial statements help users project future performance, reduce uncertainty, and assess financial position. They do NOT guarantee future profits — accounting is not fortune-telling.',
 mnemonic:'💡 Memory tip: Financial statements inform and reduce uncertainty — they never promise or guarantee future outcomes.'},

{type:'mc',
 q:'What is the balance sheet sometimes called, and what does it show?',
 opts:['Statement of financial position; it shows financial resources owned or controlled and the claims on those resources',
       'Statement of cash flows; it shows how cash was spent during the year',
       'Income statement; it shows a company\'s revenues and expenses for the period',
       'Statement of retained earnings; it shows changes in equity from profits'],
 correct:0,
 explanation:'The balance sheet is also called the \'statement of financial position.\' It shows what financial resources a company owns or controls (assets) and the claims on those resources (liabilities and equity).',
 mnemonic:'💡 Memory tip: \'Financial position\' = where you stand financially right now — your resources and who has a claim on them.'},

{type:'mc',
 q:'The balance sheet is described as \'the fundamental financial statement.\' What makes it fundamental?',
 opts:['It presents the financial position of a company at a particular point in time, showing resources and claims in a way that allows assessment of financial strength',
       'It is the only statement required by the SEC for public companies',
       'It is always prepared first before any other financial statement',
       'It shows the most detail about day-to-day cash transactions'],
 correct:0,
 explanation:'The balance sheet is fundamental because it captures a company\'s complete financial position — its resources (assets) vs. its obligations (liabilities and equity) — at a snapshot in time, enabling comparison of strength and obligations.',
 mnemonic:'💡 Memory tip: Balance sheet = snapshot. Income statement = movie. The snapshot shows where you stand; the movie shows how you got there.'},

{type:'mc',
 q:'Balance sheets are typically presented in what format to maximize usefulness?',

       'A quarterly format broken into four columns',
       'A projected format showing estimates for the next five years'],
 correct:0,
 explanation:'Balance sheets are usually presented comparatively, showing at least two years of data so users can identify trends and changes in financial position over time.',
 mnemonic:'💡 Memory tip: One year of data tells you where you are; two years tells you where you\'ve been and where you might be going.'},

{type:'mc',
 q:'What is the entity concept in accounting?',
 opts:['Personal financial activity is kept separate from business financial activity',
       'All companies owned by the same person must file combined financial statements',
       'A company must report its results in the same format as its competitors',
       'Business transactions must be reported in the entity\'s home currency only'],
 correct:0,
 explanation:'The entity concept holds that the financial results of a business entity should be reported separately from the personal finances of its owners or from other entities, even if the same person controls them all.',
 mnemonic:'💡 Memory tip: Your business wallet and your personal wallet stay SEPARATE — mixing them violates the entity concept.'},

{type:'mc',

       'Small companies always have clearer entity boundaries than large ones',

{type:'mc',
 q:'What is the historical cost convention?',
 opts:['An accounting technique that values an asset at the price paid for it at the time of its acquisition',
       'An approach that updates asset values to reflect current market prices each year',
       'A requirement to report assets at their liquidation value',
       'A method for estimating the future value of assets based on historical trends'],
 correct:0,
 explanation:'The historical cost convention records assets at their original purchase price. This means reported accounting values often differ from (and are usually less than) current market values.',
 mnemonic:'💡 Memory tip: Historical cost = what you PAID, not what it\'s worth TODAY. Your company\'s building bought in 1990 stays at its 1990 price on the books.'},

{type:'mc',
 q:'A consequence of the historical cost convention is that companies\' reported accounting values are often:',
 opts:['Less than their current market values',
       'Greater than their current market values',
       'Exactly equal to their current market values',
       'Calculated using projected future cash flows'],
 correct:0,
 explanation:'Because assets are recorded at their original purchase price (not updated to current market value), the book value of assets tends to be less than what they would sell for today, especially for assets like land and buildings that appreciate over time.',
 mnemonic:'💡 Memory tip: Think of a house bought in 2000 for $200K now worth $600K. The books still say $200K (minus depreciation) — far below market value.'},

{type:'mc',
 q:'What is the going concern assumption?',
 opts:['The assumption that a company will continue operating long enough to carry out its objectives and commitments',
       'The assumption that a company\'s assets should always be valued at liquidation prices',
       'The assumption that all companies will eventually go bankrupt',
       'The assumption that financial statements must be audited every year'],
 correct:0,
 explanation:'The going concern assumption allows readers of financial statements to assume the company will stay in business long enough to fulfill its plans and commitments — which is why assets don\'t have to be reported at their liquidation value.',
 mnemonic:'💡 Memory tip: \'Going concern\' = the business is GOING (continuing) — not shutting down. If it\'s going, no need to value everything at fire-sale prices.'},

{type:'mc',
 q:'Because of the going concern assumption, assets on the balance sheet do NOT have to be reported at:',
 opts:['Liquidation value',
       'Historical cost',
       'Book value',
       'Original purchase price'],
 correct:0,
 explanation:'If a company were shutting down, it would need to report assets at the prices they\'d fetch in a forced sale (liquidation value). The going concern assumption removes this requirement because the company is expected to keep operating.',
 mnemonic:'💡 Memory tip: If the store\'s closing tomorrow you price everything for a fire sale. If it\'s staying open, no need — that\'s the going concern assumption at work.'},

{type:'mc',
 q:'What is book value?',
 opts:['The asset\'s original cost minus its accumulated depreciation',
       'The current market price at which an asset could be sold today',
       'The total value of all assets listed on the balance sheet',
       'The price at which an asset will be replaced when it wears out'],
 correct:0,
 explanation:'Book value = Cost − Accumulated Depreciation. It represents how much of an asset\'s original cost remains \'on the books\' after accounting for the wear and tear (depreciation) that has been recorded over time.',
 mnemonic:'💡 Memory tip: Book value = what you paid MINUS what\'s been \'used up.\' A $50K machine with $20K of depreciation has a $30K book value.'},

{type:'mc',
 q:'What does the income statement report?',
 opts:['A company\'s financial performance over a specified period of time',
       'A company\'s financial position at a specific point in time',
       'The detailed movement of cash in and out during the period',
       'The total market value of the company\'s outstanding shares'],
 correct:0,
 explanation:'The income statement describes financial performance over a period of time by subtracting expenses from revenues to arrive at net income (or net loss).',
 mnemonic:'💡 Memory tip: Income statement = PERFORMANCE over time. Balance sheet = POSITION at a point. One is a movie, one is a photo.'},

{type:'mc',
 q:'What is the formal accounting definition of REVENUE?',
 opts:['The value of the goods and services provided by a company in its normal business operations',
       'Any cash received by the company during the accounting period',
       'The total market value of all assets owned by the company',
       'The amount of profit remaining after all expenses are paid'],
 correct:0,
 explanation:'Revenue is the value of goods and services provided in the normal course of business — not simply cash received. Revenue and cash receipts often differ in timing due to revenue recognition principles.',
 mnemonic:'💡 Memory tip: Revenue = value DELIVERED in normal operations. Cash received is a different concept tracked on the cash flow statement.'},

{type:'mc',
 q:'What is the formal accounting definition of EXPENSES?',
 opts:['The value of resources used in generating the reported revenue',
       'Any cash payment made by the company during the accounting period',
       'The amount of money borrowed from banks during the year',
       'The total cost of all assets purchased during the period'],
 correct:0,
 explanation:'Expenses are the value of resources consumed in generating revenue — they represent the cost of doing business that gets subtracted from revenue to arrive at net income.',
 mnemonic:'💡 Memory tip: Expenses = resources USED UP to generate revenue. Think: revenue is the harvest; expenses are the seeds and labor it took to grow it.'},

{type:'mc',
 q:'What is net income, and how is it calculated?',
 opts:['The overall economic performance summary for a period; calculated as Revenues minus Expenses',
       'Total cash received minus total cash paid out during the period',
       'Total assets minus total liabilities at the end of the period',
       'Total revenues minus total assets on the balance sheet'],
 correct:0,
 explanation:'Net income is the accountant\'s summary of overall economic performance. Net Income = Revenues − Expenses. If revenues exceed expenses, the result is net income (profit); if expenses exceed revenues, the result is a net loss.',
 mnemonic:'💡 Memory tip: Net income = Revenues MINUS Expenses. Net = what\'s left over after the business costs are subtracted from what it earned.'},

{type:'mc',
 q:'What is Earnings Per Share (EPS) and how is it calculated?',
 opts:['Net Income divided by the number of shares of stock outstanding',
       'Total Revenue divided by the number of shareholders',
       'Total Assets divided by the number of shares outstanding',
       'Net Income divided by total liabilities'],
 correct:0,
 explanation:'EPS = Net Income ÷ Shares Outstanding. It tells investors how much profit was generated for each share of stock, making it easier to compare companies of different sizes.',
 mnemonic:'💡 Memory tip: EPS = how much profit did each SHARE earn? Divide the whole pie (net income) by the number of slice-holders (shares outstanding).'},

{type:'mc',
 q:'What is the distinction between \'Gains and Losses\' and regular revenues and expenses on the income statement?',
 opts:['Gains and losses arise from activities OUTSIDE the normal course of business, while revenues and expenses arise from normal operations',
       'Gains and losses always involve cash, while revenues and expenses do not',
       'Gains and losses only appear on the balance sheet, not the income statement',
       'There is no distinction — gains and losses are another term for revenues and expenses'],
 correct:0,
 explanation:'Revenues and expenses come from a company\'s normal business operations. Gains and losses are money made or lost from activities OUTSIDE normal operations — for example, a manufacturing company selling a piece of land.',
 mnemonic:'💡 Memory tip: Normal operations → Revenue/Expense. Outside normal operations → Gain/Loss. A shoe store\'s shoe sales are revenue; selling its old delivery truck is a gain or loss.'},

{type:'mc',
 q:'What is the time period principle?',
 opts:['The concept that a business should report its financial results over standard time periods, typically monthly, quarterly, or annually',
       'The idea that all assets must be depreciated over exactly the same number of years',
       'The requirement that financial statements must be filed within 30 days of period-end',
       'The concept that accounting records must be kept for a minimum of seven years'],
 correct:0,
 explanation:'The time period principle requires that a business\'s financial results be reported over standard, consistent time periods (monthly, quarterly, or annually) so that users receive timely, comparable information.',
 mnemonic:'💡 Memory tip: A business runs continuously, but you can\'t wait forever for a report. The time period principle chops ongoing operations into digestible, regular reporting chunks.'},

{type:'mc',
 q:'According to the revenue recognition principle, when should revenue be recognized?',
 opts:['When value (work) has been delivered to the customer and collectibility of cash is reasonably assured',
       'Only when cash has actually been received from the customer',
       'When the contract with the customer is first signed',
       'At the end of every fiscal year, regardless of when value was delivered'],
 correct:0,
 explanation:'Revenue recognition requires two conditions: (1) work/value has been delivered to the customer, and (2) collection of cash is reasonably assured. Cash timing is irrelevant — it\'s about when value was delivered.',
 mnemonic:'💡 Memory tip: Two keys to recognize revenue: VALUE DELIVERED + CASH COLLECTIBLE. Signing a contract or receiving cash alone isn\'t enough.'},

{type:'mc',
 q:'A university collects $10,000 in tuition on September 1 for an academic year running September 1 through April 30. As of December 31, how much revenue should the university recognize for that calendar year?',
 opts:['$5,000, because half the academic year\'s value was delivered in the first four months',
       '$10,000, because the full tuition was collected on September 1',
       '$2,000, because only September and October fall within the calendar year',
       '$0, because tuition revenue can only be recognized at the end of the academic year'],
 correct:0,
 explanation:'Revenue is recognized when value is delivered. The academic year spans 8 months equally split across two calendar years (4 months each). Half the value (4/8 months) was delivered by December 31, so half the revenue ($5,000) is recognized.',
 mnemonic:'💡 Memory tip: Revenue follows the VALUE delivered, not the cash. Cash arrived in September; value is dripping out evenly across 8 months. Split it accordingly.'},

{type:'mc',
 q:'Revenue recognition is a cornerstone of which broader accounting system?',

       'Cash basis accounting',
       'Tax accounting',
       'Managerial accounting'],
 correct:0,
 explanation:'Revenue recognition is a cornerstone of accrual accounting, which records revenues and expenses when they are earned or incurred — not when cash changes hands.',
 mnemonic:'💡 Memory tip: Accrual = record when EARNED, not when PAID. Revenue recognition is how accrual accounting decides when \'earned\' actually happened.'},

{type:'mc',
 q:'What are the three categories that ALL cash transactions are classified into on the statement of cash flows?',
 opts:['Operating, investing, and financing activities',
       'Revenue, expenses, and net income',
       'Assets, liabilities, and equity',
       'Short-term, long-term, and permanent activities'],
 correct:0,
 explanation:'Every cash transaction a company has falls into one of three buckets: operating (day-to-day business), investing (buying/selling long-term assets), or financing (raising/repaying capital from investors and creditors).',
 mnemonic:'💡 Memory tip: OIF — Operating, Investing, Financing. Think: \'Oh, I Found three buckets for all my cash.\''},

{type:'mc',
 q:'Which of the following best describes OPERATING activities on the statement of cash flows?',
 opts:['Day-to-day activities related to delivering or producing goods and providing services',
       'Purchasing and selling long-term assets such as land and equipment',
       'Obtaining cash from investors and repaying creditors',
       'Issuing new shares of stock to the public'],
 correct:0,
 explanation:'Operating activities are the bread-and-butter business activities — producing goods, delivering services, and the day-to-day transactions that make the business run.',
 mnemonic:'💡 Memory tip: Operating = the business OPERATING normally. If it\'s what the company does every day to make money, it\'s operating.'},

{type:'mc',
 q:'Which of the following best describes INVESTING activities on the statement of cash flows?',
 opts:['Acquiring and selling long-term productive assets, investment securities, and lending/collecting on loans',
       'Collecting cash from customers for services already delivered',
       'Paying wages and salaries to employees',
       'Borrowing money from banks and repaying those loans'],
 correct:0,
 explanation:'Investing activities involve (1) acquiring/selling long-term assets like property, plant, and equipment; (2) acquiring/selling investment securities; and (3) lending money and collecting on those loans.',
 mnemonic:'💡 Memory tip: Investing activities = BUILDING the business\'s future (buying equipment, making investments) rather than running its present operations.'},

{type:'mc',
 q:'Which of the following best describes FINANCING activities on the statement of cash flows?',
 opts:['Obtaining resources from owners and creditors, providing returns to owners, and repaying borrowings',
       'Collecting payments from customers for products sold',
       'Purchasing raw materials and inventory for production',
       'Acquiring and selling short-term investments'],
 correct:0,
 explanation:'Financing activities involve how the company funds itself: getting money from investors (owners) or creditors, paying dividends to owners, and repaying what\'s been borrowed.',
 mnemonic:'💡 Memory tip: Financing = FUNDING the company. Think of it as the activities that answer \'where did you get the money?\' — from owners or lenders.'},

{type:'dd',
 q:'Classify each cash transaction as Operating, Investing, or Financing activity.',
 cols:['Operating',
       'Investing',
       'Financing'],
 items:[
   {text:'Cash received from customers for services', answer:'Operating'},

   {text:'Purchase of new equipment', answer:'Investing'},

 ],

{type:'mc',
 q:'What are notes to financial statements, and what is their status relative to the statements themselves?',
 opts:['They provide additional information about operations and financial position, and are considered an integral part of the financial statements',
       'They are optional supplementary documents that companies may choose to include or omit',
       'They are prepared only by auditors and are separate from management\'s financial statements',
       'They contain only legal disclaimers and are not considered part of the financial statements'],
 correct:0,
 explanation:'Notes are not optional footnotes — they are an integral (essential) part of the financial statements, providing accounting assumptions used in preparation plus supplemental information not contained in the statements themselves.',
 mnemonic:'💡 Memory tip: Notes are not optional fine print — they\'re PART of the financial statements. Ignoring the notes is like reading only the chapter summaries of a textbook.'},

{type:'ms',
 q:'Which of the following are among the four types of notes to financial statements? (Select all that apply)',
 opts:['A summary of significant accounting policies',
       'Additional information about summary totals in the statements',
       'Disclosure of important information not recognized in the statements',
       'Supplementary information required by the FASB or SEC'],
 correctSet:[0,1,2,3],
 explanation:'All four are types of notes: (1) accounting policy summaries, (2) additional detail on statement line items, (3) disclosure of off-statement information, and (4) FASB/SEC-required supplemental disclosures.',
 mnemonic:'💡 Memory tip: All four are correct here. Remember the four types as \'ADDS\': Accounting policies, Detail on totals, Disclosure of off-statement info, Supplementary required disclosures.'},

{type:'mc',
 q:'Which two regulatory bodies can require companies to include supplementary information in their financial statement notes?',
 opts:['The Financial Accounting Standards Board (FASB) and the Securities and Exchange Commission (SEC)',
       'The Internal Revenue Service (IRS) and the Federal Reserve',
       'The American Institute of CPAs (AICPA) and the Department of Treasury',
       'The International Accounting Standards Board (IASB) and the World Bank'],
 correct:0,
 explanation:'The FASB sets U.S. accounting standards (GAAP) and may require certain supplemental disclosures. The SEC regulates public companies and has its own disclosure requirements that must appear in the notes.',
 mnemonic:'💡 Memory tip: FASB sets the rules for HOW to account; SEC enforces WHAT must be disclosed for public companies. Both can require notes disclosures.'},

{type:'mc',
 q:'Why do managers and owners of a company have an inherent incentive to bias financial statements in a favorable direction?',
 opts:['Better reported numbers make it easier to get loans, increase stock prices, and raise salary bonuses',
       'Managers are legally required to maximize reported profits under GAAP',
       'Favorable statements reduce the amount of taxes the company must pay',
       'The SEC rewards companies that report higher earnings with reduced filing requirements'],
 correct:0,
 explanation:'Managers benefit personally from favorable numbers — higher stock prices (which matter for stock options and reputation), easier access to credit at lower rates, and larger performance-based bonuses all depend on strong reported results.',
 mnemonic:'💡 Memory tip: Follow the incentives: better numbers → higher stock price + easier loans + bigger bonuses. That\'s exactly why an OUTSIDE check is needed.'},

{type:'mc',
 q:'What does an external audit report actually certify?',
 opts:['That the financial statements were prepared using GAAP and the audit was conducted using accepted auditing standards',
       'That the company is well-run, financially sound, and free of all fraud',
       'That every number in the financial statements is correct to the penny',
       'That the company will be profitable in the coming fiscal year'],
 correct:0,
 explanation:'An audit report certifies two things only: (1) GAAP was used to prepare the statements, and (2) the audit was conducted using accepted auditing standards. It is NOT a guarantee of accuracy, fraud-free status, or future performance.',
 mnemonic:'💡 Memory tip: GAAP + Standards. That\'s it. The audit report is not a \'this company is great\' certificate — it\'s a \'they followed the rules\' certificate.'},

{type:'ms',
 q:'Which of the following are specific procedures external auditors perform? (Select all that apply)',
 opts:['Examine original documents underlying key transactions',
       'Spot-check that reported inventory physically exists',
       'Contact a sample of customers and suppliers to confirm reported transactions',
       'Review the company\'s internal accounting procedures and controls'],
 correctSet:[0,1,2,3],
 explanation:'All four are actual audit procedures: document examination, physical inventory verification, third-party confirmation, and internal control review.',
 mnemonic:'💡 Memory tip: DISC: Documents, Inventory spot-check, Supplier/customer Confirmation, Controls review. Auditors check all four.'},

{type:'ms',
 q:'Which entities are required to have their financial statements externally audited? (Select all that apply)',
 opts:['All publicly traded companies (required by the SEC)',
       'Private companies seeking bank loans (often required by the bank)',
       'Every business with more than 10 employees',
       'New companies that voluntarily seek to establish credibility with investors'],
 correctSet:[0],
 explanation:'SEC requires audits for all public companies. Banks often require them for loan applicants. New companies may voluntarily get audited to build credibility. There is no universal requirement based purely on company size (employee count).',
 mnemonic:'💡 Memory tip: Public = must. Bank loan = usually must. New company wanting credibility = may choose to. Employee count alone? Not a trigger.'},

{type:'mc',
 q:'Even though the company being audited hires and pays its own auditor, why can the audit still be trusted?',
 opts:['Auditors protect their reputation and face significant legal liability if they approve false statements',
       'The government always independently verifies every audit after it is completed',
       'Auditors are paid a fixed government rate so they have no financial incentive to please the company',
       'Companies must rotate auditors every year, preventing any long-term relationship from forming'],
 correct:0,
 explanation:'Two forces keep auditors honest: (1) Reputation — Big 4 and other reputable firms won\'t risk their standing by signing off on questionable statements; and (2) Lawsuits — auditors face serious legal liability from investors who lose money relying on bad statements.',
 mnemonic:'💡 Memory tip: Reputation + Legal risk = auditor motivation to stay honest, even when hired by the company they\'re checking.'},

{type:'mc',
 q:'What are the two primary qualities that make accounting information useful?',
 opts:['Relevance and reliability',
       'Accuracy and speed',
       'Comparability and conservatism',
       'Materiality and articulation'],
 correct:0,
 explanation:'Relevance and reliability are the two primary qualities. Relevance means information can impact a decision; reliability means users can trust it to represent economic reality accurately.',
 mnemonic:'💡 Memory tip: R&R — like rest and relaxation, except for accountants it\'s Relevance and Reliability.'},

{type:'ms',
 q:'For accounting information to be RELEVANT, it must: (Select all that apply)',
 opts:['Be provided on a timely basis',
       'Be useful in evaluating past decisions',
       'Provide some basis for forecasting future financial performance',
       'Be verifiable by multiple independent parties'],
 correctSet:[0,1,2],
 explanation:'Relevance requires timeliness, usefulness for evaluating the past, and a basis for forecasting the future. Verifiability is a characteristic of RELIABILITY, not relevance.',
 mnemonic:'💡 Memory tip: Relevance = does it help you DECIDE? Timely, past-evaluating, and future-projecting. Verifiability belongs to reliability\'s side.'},

{type:'mc',
 q:'What is verifiability, and which quality of accounting information does it support?',
 opts:['It means multiple individuals or measures would reach similar conclusions from the same data; it supports RELIABILITY',
       'It means information is provided quickly enough to influence decisions; it supports RELEVANCE',
       'It means information can be compared across different companies; it supports COMPARABILITY',
       'It means information is conservative and avoids overstating gains; it supports CONSERVATISM'],
 correct:0,
 explanation:'Verifiability means that different people examining the same information would reach consistent conclusions. This supports reliability — it\'s what makes external users trust information they can\'t independently verify from internal records.',
 mnemonic:'💡 Memory tip: Verifiable = multiple people check it and agree. That agreement is what makes it RELIABLE.'},

{type:'mc',
 q:'Why has accounting gradually shifted toward more relevance and less reliability in recent decades?',
 opts:['The world has filled with competing sources of instant information, increasing the demand for timely accounting data',
       'Reliable information has been proven to be useless for investor decision-making',
       'The FASB eliminated reliability as an accounting quality in its latest standards',
       'Auditors lobbied to reduce reliability requirements to make audits cheaper'],
 correct:0,
 explanation:'As the world has become flooded with fast-moving information from many sources, accounting standards have had to respond by prioritizing timely, decision-relevant information even if it involves more uncertainty — hence the shift toward relevance.',
 mnemonic:'💡 Memory tip: In the age of instant information, waiting for perfectly verified data can mean the data arrives too late to be useful.'},

{type:'mc',
 q:'What is comparability in accounting?',
 opts:['The quality that makes information more useful by allowing it to be measured against a benchmark — either other companies or the same company across different periods',
       'The practice of recording all transactions in a conservative manner to protect lenders',
       'The requirement that all companies use identical accounting software systems',
       'The principle that revenues and expenses must be matched to the same time period'],
 correct:0,
 explanation:'Comparability allows users to benchmark — either comparing a company to peers, or comparing the same company\'s performance across different time periods. Both comparisons make data more useful.',
 mnemonic:'💡 Memory tip: Comparability = apples to apples. You can compare Company A vs. Company B, or Year 1 vs. Year 2 of the same company.'},

{type:'mc',
 q:'Consistency is best described as:',
 opts:['Comparability of accounting data for the same company over time — using the same practices, formats, and terminology period after period',
       'The requirement that all companies in the same industry use identical accounting methods',
       'The concept that a company should always report the most conservative numbers possible',
       'The idea that revenues and expenses should always be equal at the end of each period'],
 correct:0,
 explanation:'Consistency is a specific form of comparability — it applies within the same company over time. Without a clear reason to change, a company should keep its accounting practices, formats, and terminology the same so that comparisons across years are meaningful.',
 mnemonic:'💡 Memory tip: Consistency = same company, same rules, year after year. Changing your accounting methods randomly makes year-to-year comparisons meaningless.'},

{type:'mc',
 q:'What is the principle of conservatism in accounting?',
 opts:['When in doubt, recognize all losses but do not recognize any gains until they are assured',
       'When in doubt, recognize all gains but delay recognizing any losses',
       'Always report the most optimistic financial picture possible to attract investors',
       'Avoid making any estimates — only record transactions with certain outcomes'],
 correct:0,
 explanation:'Conservatism means: losses get recognized as soon as they become evident; gains don\'t get recognized until they\'re certain. This traditionally served lenders who preferred understatement of assets as a safety margin.',
 mnemonic:'💡 Memory tip: Conservative in accounting = PESSIMISTIC. Take losses early, delay gains. Think of the cautious lender who prefers undervalued collateral.'},

{type:'mc',
 q:'Why has the FASB moved away from conservatism as a formal guiding principle?',
 opts:['Mindless conservatism leads to biased financial reporting by making a company look worse than it really is',
       'Conservatism makes financial statements too difficult for investors to understand',
       'Modern companies have no uncertainty in their financial estimates, making conservatism unnecessary',
       'The SEC banned conservatism from GAAP in 2010'],
 correct:0,
 explanation:'While conservatism protects against optimism, taken too far it creates biased statements that unfairly understate a company\'s financial position. The FASB has moved away from it as a formal standard, though most accountants still apply it informally.',
 mnemonic:'💡 Memory tip: Too much pessimism is just as misleading as too much optimism. FASB wants NEUTRAL, not biased in either direction.'},

{type:'mc',
 q:'Why do most accountants still apply conservatism in practice, even though FASB has moved away from it as a formal principle?',
 opts:['It serves as a counterbalance to managers\' natural tendency to be overly optimistic in their financial estimates',
       'The SEC still legally requires it for all public company filings',
       'Conservatism always produces the most accurate financial results',
       'It is required by international accounting standards (IFRS) which override FASB'],
 correct:0,
 explanation:'Managers naturally tend toward optimism in their estimates. Practical conservatism serves as a useful counterweight — pushing back against rosy projections to arrive at more realistic figures.',
 mnemonic:'💡 Memory tip: Managers see the glass half-full; conservative accounting reminds them to account for the half-empty part too.'},

{type:'mc',
 q:'What does \'materiality\' mean in an accounting context?',
 opts:['Whether an item is large enough to make any difference to a financial statement user\'s decision',
       'Whether an item is a physical, tangible object rather than an intangible right',
       'Whether a transaction has been properly documented with original source documents',
