// ══ MULTIPLE CHOICE ══════════════════════════

{type:'mc',
 q:"What is the complete definition of accounting?",
 opts:["The process of filing taxes and managing payroll for a company",
       "The recording of day-to-day financial activities AND organizing that information into summary reports used to evaluate a company's financial status",
       "The process of auditing a company's books for government compliance",
       "The act of preparing financial forecasts for future business decisions"],
 correct:1,
 explanation:"Accounting has two parts: (1) recording daily financial activities and (2) organizing that data into summary reports to evaluate financial status. Both parts are required.",
 mnemonic:"💡 Memory tip: Accounting = <strong>Record + Report</strong>. Think of an accountant as a journalist — they record events daily, then write a summary story so others can evaluate what happened."},

{type:'mc',
 q:"What does the Balance Sheet report?",
 opts:["Net income earned during a period",
       "Cash collected and paid out in operating, investing, and financing activities",
       "A company's assets, liabilities, and owners' equity",
       "A company's revenues and expenses over a fiscal year"],
 correct:2,
 explanation:"The Balance Sheet is a snapshot at one point in time showing what a company OWNS (assets), what it OWES (liabilities), and what belongs to the owners (owners' equity).",
 mnemonic:"💡 Memory tip: <strong>A = L + OE</strong>. Assets = Liabilities + Owners' Equity. The sheet must always 'balance' like a scale."},

{type:'mc',
 q:"How is net income calculated?",
 opts:["Total assets minus total liabilities",
       "Cash collected minus cash paid out",
       "Total revenues minus total expenses",
       "Owners' equity minus long-term debt"],
 correct:2,
 explanation:"Net income = Revenues − Expenses. If revenues exceed expenses, the company has a profit. If expenses exceed revenues, it has a loss.",
 mnemonic:"💡 Memory tip: 'Net' means what's left after subtracting. <strong>Revenue IN, expenses OUT — what's left is net income.</strong> Like a paycheck: gross pay minus deductions = net pay."},

{type:'mc',
 q:"Which statement BEST describes the role of the FASB?",
 opts:["A U.S. government agency that enforces accounting rules through legal penalties",
       "A private body supported by the business community that sets U.S. accounting standards",
       "An international organization that creates worldwide accounting standards",
       "A government body that regulates stock exchanges"],
 correct:1,
 explanation:"The FASB is PRIVATE — not a government agency. It was established and is supported by the U.S. business community, financial analysts, and practicing accountants.",
 mnemonic:"💡 Memory tip: <strong>FASB = private club, not a government department.</strong> No badge, no government salary — just industry professionals writing the rulebook together."},

{type:'mc',
 q:"Which organization regulates U.S. stock exchanges and works to ensure investors aren't misled by companies hiding or manipulating financial data?",

 mnemonic:"💡 Memory tip: <strong>SEC = Stock Exchange Cop.</strong> The SEC patrols Wall Street to make sure companies play fair with investors."},

{type:'mc',
 q:"Which statement about the IRS and financial accounting is CORRECT?",

       "The IRS uses a company's financial statements to determine its tax bill",
       "The IRS establishes when income is taxed but has NO role in setting financial accounting rules",
       "The IRS and the FASB jointly approve accounting standards"],
 correct:2,
 explanation:"The IRS defines TAX rules, but plays NO role in financial accounting rules. A company's financial statements are NOT used to determine tax liability — those are two completely separate systems.",
 mnemonic:"💡 Memory tip: <strong>IRS ≠ FASB.</strong> IRS = tax world. FASB = financial reporting world. Same company, totally different rulebooks. Never mix them up."},

{type:'mc',

       "Regulate the New York Stock Exchange",
       "Develop a common set of worldwide accounting standards",

{type:'mc',

       "Government Approved Accounting Policies — establishes IRS tax collection rules",
       "Global Accounting and Auditing Protocols — creates international tax standards"],

 explanation:"GAAP = Generally Accepted Accounting Principles. These principles (with origins in the early 1900s) ensure financial reporting is consistent and transparent so all companies can be compared fairly.",
 mnemonic:"💡 Memory tip: Think of a <strong>gap</strong> between two companies' data. GAAP fills that gap by making everyone report the same way — apples to apples, not apples to oranges."},

{type:'mc',

 opts:["The 2008 financial crisis; it increased IRS tax audits of corporations",
       "International competition in the 1990s; it increased IASB authority over U.S. companies",
       "A wave of corporate accounting scandals starting in 2001; it increased U.S. federal government scrutiny of the production of financial statements",
       "Rapid advances in technology; it increased cybersecurity requirements for financial data"],
 correct:2,
 explanation:"Major corporate scandals (like Enron) starting in 2001 prompted Congress to pass Sarbanes-Oxley (SOX), which increased federal government scrutiny specifically over HOW financial statements are produced.",
 mnemonic:"💡 Memory tip: <strong>Scandals → SOX.</strong> Companies cooked the books, so Congress cooked up a new law. SOX watches HOW you make the statements, not just what they say."},

       "The act of preparing tax returns for a business"],

 explanation:"Bookkeeping is defined as 'the preservation of a systematic, quantitative record of an activity.' Key words: systematic (organized), quantitative (using numbers), record (keeping track).",
 mnemonic:"💡 Memory tip: Bookkeeping = <strong>keeping the books</strong>. Imagine a librarian who carefully preserves every record in a numbered, organized system. No record = no books = no bookkeeping."},



{type:'mc',

 mnemonic:"💡 Memory tip: Accounting = <strong>Rules + Judgment</strong>. Like a judge in court — they must follow the law (rules) but also exercise wisdom (judgment) in how they apply it to each unique case."},

{type:'mc',

 explanation:"A CPA firm provides freelance business advice, particularly related to accounting issues. They are outside consultants — businesses hire them when they need expert accounting guidance.",
 mnemonic:"💡 Memory tip: A CPA firm is like an <strong>accounting doctor's office</strong>. You go there when you have a financial problem that needs expert diagnosis and advice."},

{type:'mc',

 mnemonic:"💡 Memory tip: <strong>PCAOB = The Audit Police.</strong> If an audit firm cheats, PCAOB can kick them out of the game permanently. That's serious enforcement power."},

{type:'mc',
